name: multitimescale_sfs_fourrooms

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - matplotlib
  - pandas

  - pip:
      - gymnasium
      - hydra-core
      - wandb
      - moviepy
      - shimmy
      - termcolor
      - tensorboard
      - opencv-python
      - torch 
      - torchvision
      - git+https://github.com/raymondchua/miniworld_four_rooms.git
      - dm-env
      
