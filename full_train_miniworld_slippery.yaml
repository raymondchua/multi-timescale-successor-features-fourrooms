defaults:
  - agent: DQN_agent
  - domain: Miniworld/Miniworld_Two_Tasks
  - _self_ # this yaml file is overriding configs from the Defaults List (eg. {agent}.yaml)
  -  resources: null

# params only for SF-based agent
update_task_every_step: 16

# environment setting
env:
  action_repeat: ??? # to be defined later
  obs_shape: ??? # to be specified later
  obs_type: pixels # [states, pixels]
  seed: 42

# eval
eval:
  eval_after_each_epoch: true
  eval_exploration_epsilon: 0.1
  eval_after_train_step: 200000 # evaluate after this many steps per task (heuristic by looking at the training curve)
  evaluate_task_during_training: true
  num_eval_episodes: 10

# logging
logging:
  mode: full_train_slippery_fix
  use_wandb: true
  wandb_dir: ./wandb
  wandb_mode: "offline"

# replay buffer
replay:
  compress_state: true
  min_replay_capacity_fraction: 0.05
  nstep: 10
  replay_buffer_num_workers: 4
  reset_buffer_before_each_task: false
  use_priority_replay: false

  # parameters for using prioritized experience replay
  priority_exponent: 0.6
  importance_sampling_exponent_begin_value: 0.4
  importance_sampling_exponent_end_value: 1.0
  uniform_sample_probability: 1e-3
  normalize_weights: true

paths:
  work_dir: ??? # to be defined later

# params for pre-training
pretrain:
#  dir: ${domain.pretrain.tabular_dir}
  update_encoder: true # should always be true for pre-training
  use_pretrained_policy: false #set to true to use a pretrained policy from tabular QL agent

# snapshot
snapshot:
  base_dir: ./models/
  save_snapshot_when_eval: false #set to true to save the snapshot when evaluating the agent to track the progress
  save_snapshot_after_each_task: false
  snapshot_dir: ./models/full_train/${domain.train.logging.experiment}/${domain.short_name}/${agent.name}/${train.seed}/
  use_alternate_discount: false

# train settings
train:
  allow_post_train: true
  exploration_epsilon_decay_frame_fraction: ???  # epsilon-greedy decay fraction at 0.02 for minigrid
  explore_every_task: false
  explore_task_on_only_first_encounter: false
  feature_dim: 128
  grad_error_bound: 10.0
  learn_period: 16
  log_frequency: 100
  lr: 1e-4
  lr_consolidation: 1
  multi_task: false  #set false to prevent re-init task at the beginning of each episode
  num_seed_frames: ??? # to be defined later
  num_exposure: 2 # number of cycles for all tasks
  optimizer: adam # [rmsprop, adam, sgd]
  optimizer_b_1: 0.9
  optimizer_b_2: 0.999
  optimizer_task: adam
  plasticity_injection: 0.5 # plasticity_injection based on num_train_frames
  predefined_task_id: None
  reset_optimizer_before_each_task: false
  seed: 97
  save_coverage_frequency_factor: 10
  sf_dim: 128
  target_network_update_period: 1000
  terminate_after_first_task: false
  use_double_q: true
  use_predefined_task_id: false #set to true to use the predefined task id


hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}
  sweep:
    dir: ./exp_sweep/${now:%Y.%m.%d}/${now:%H%M}_${domain.project_name}
    subdir: ${hydra.job.num}
#  launcher:
#    timeout_min: 4300
